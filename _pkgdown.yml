url: https://tkcaccia.github.io/fibermargin/
destination: site
title: FiberMargin

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#24756f"
    base_font:
      google: Source Sans 3
    heading_font:
      google: Source Sans 3
    code_font:
      google: Source Code Pro

home:
  title: "FiberMargin: training-free categorical mask repair"
  description: >
    A deterministic C++ operator for repairing categorical masks and spatial
    labels from 2D or 3D coordinates and labels alone.

navbar:
  structure:
    left: [intro, reference, benchmarks, manuscript]
    right: [search, github]
  components:
    intro:
      text: Get started
      href: index.html
    benchmarks:
      text: Benchmarks
      href: articles/benchmarks.html
    manuscript:
      text: Manuscript
      href: https://github.com/tkcaccia/fibermargin/blob/main/output/pdf/fibermargin-jmlr-manuscript.pdf

reference:
  - title: Repair and Refinement
    desc: Minimal interfaces for regular masks and irregular spatial fields.
    contents:
      - clean_categorical_mask
      - refine_spatial_labels
  - title: Mask Evaluation
    desc: Reproducible mask corruptions and damage-aware evaluation.
    contents:
      - corrupt_categorical_mask
      - evaluate_mask_cleaning
  - title: Simulation
    desc: Reproducible planar, gradient, junction, and volumetric generators.
    contents:
      - simulate_spatial_clusters
      - simulate_spatial_domains
      - simulate_gradient_regions
      - simulate_complex_spatial_domains
      - simulate_volumetric_domains
  - title: Evaluation
    desc: Common benchmark construction, metrics, and timed method comparison.
    contents:
      - spatial_benchmark
      - evaluate_spatial_refinement
      - benchmark_spatial_refiners
  - title: Benchmark Data
    desc: Licensed real-data benchmark access and provenance.
    contents:
      - available_spatial_benchmarks
      - load_spatial_benchmark
      - dlpfc_benchmark

footer:
  structure:
    left: developed_by
    right: built_with
